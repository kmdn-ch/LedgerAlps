name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GORELEASER_VERSION: "v2.6.1"

jobs:
  goreleaser:
    name: GoReleaser (Linux + macOS + Windows binaries)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # GoReleaser needs full history for changelog

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        # --no-package-lock prevents creating/modifying package-lock.json,
        # which would make the git worktree dirty and fail goreleaser's dirty check.
        run: cd frontend && npm install --no-package-lock

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows-installer:
    name: Windows NSIS Installer
    runs-on: windows-latest
    needs: goreleaser
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NSIS
        shell: pwsh
        run: |
          # Check if NSIS is already present (pre-installed on some runner images)
          if (Test-Path 'C:\Program Files (x86)\NSIS\makensis.exe') {
            Write-Host "NSIS already installed at default path"; exit 0
          }
          # Try winget (built-in on all GitHub Windows runners, no rate-limit)
          Write-Host "Installing NSIS via winget..."
          winget install NSIS.NSIS `
            --silent --accept-package-agreements `
            --accept-source-agreements --disable-interactivity 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "winget install succeeded"
          } else {
            # Fall back: choco with 3 retries and 15 s back-off
            Write-Host "winget failed, retrying with choco..."
            $installed = $false
            for ($i = 1; $i -le 3; $i++) {
              choco install nsis -y --no-progress 2>&1
              if ($LASTEXITCODE -eq 0) { $installed = $true; break }
              Write-Host "choco attempt $i failed — waiting 15 s..."
              Start-Sleep -Seconds 15
            }
            if (-not $installed) { exit 1 }
          }
          # Ensure NSIS directory is on PATH for the build step
          $nsisDir = 'C:\Program Files (x86)\NSIS'
          if (Test-Path $nsisDir) {
            Add-Content -Path $env:GITHUB_PATH -Value $nsisDir
            Write-Host "Added to PATH: $nsisDir"
          }

      - name: Download Windows binaries from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.goreleaser.outputs.version }}
        shell: bash
        run: |
          # GoReleaser .Version strips the leading 'v' (e.g. v1.1.0 → 1.1.0)
          VERSION_NUM="${VERSION#v}"
          # Download and extract the windows amd64 zip from the release
          gh release download "$VERSION" \
            --pattern "ledgeralps_${VERSION_NUM}_windows_amd64.zip" \
            --dir installer-work
          cd installer-work
          unzip -o "ledgeralps_${VERSION_NUM}_windows_amd64.zip"

      - name: Stage installer files
        shell: bash
        env:
          VERSION: ${{ needs.goreleaser.outputs.version }}
        run: |
          VERSION_NUM="${VERSION#v}"
          STAGE="infrastructure/windows"
          # Binaries only — frontend is embedded inside ledgeralps-server.exe
          cp installer-work/ledgeralps-server.exe "$STAGE/"
          cp installer-work/ledgeralps.exe         "$STAGE/"
          cp installer-work/ledgeralps-cli.exe     "$STAGE/"
          echo "Staged files:"
          ls -lh "$STAGE/"

      - name: Build NSIS installer
        shell: pwsh
        env:
          VERSION: ${{ needs.goreleaser.outputs.version }}
        run: |
          $versionNum = $env:VERSION -replace '^v', ''
          # Locate makensis: choco adds it to PATH, fall back to common install dirs
          $makensis = (Get-Command makensis -ErrorAction SilentlyContinue)?.Source
          if (-not $makensis) {
            $makensis = @(
              'C:\Program Files (x86)\NSIS\makensis.exe',
              'C:\Program Files\NSIS\makensis.exe'
            ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          if (-not $makensis) { throw "makensis.exe not found — check NSIS installation" }
          Write-Host "Using makensis: $makensis"
          Set-Location "infrastructure\windows"
          & $makensis /DVERSION="$versionNum" installer.nsi
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload installer to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.goreleaser.outputs.version }}
        shell: bash
        run: |
          installer=$(ls infrastructure/windows/LedgerAlps_Setup_*.exe)
          gh release upload "$VERSION" "$installer" --clobber
