worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ──────────────────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log main;

    # ─── Performance ──────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    # ─── Sécurité globale ─────────────────────────────────────────────────
    server_tokens   off;
    client_max_body_size 10m;

    # Rate limiting — Zone partagée 10 MB → ~160'000 IP
    limit_req_zone  $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone  $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_status 429;

    # ─── Redirect HTTP → HTTPS ────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─── HTTPS Principal ──────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name ledgeralps.local;

        ssl_certificate     /etc/nginx/certs/ledgeralps.crt;
        ssl_certificate_key /etc/nginx/certs/ledgeralps.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:SSL:50m;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ─── Security Headers ─────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                                      always;
        add_header X-Frame-Options           "DENY"                                         always;
        add_header X-XSS-Protection          "1; mode=block"                                always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';" always;

        # ─── Frontend React (SPA) ─────────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # Assets statiques — cache long
        location ~* \.(js|css|woff2|svg|png|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ─── API Backend ─────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            # Pas de cache pour l'API
            add_header Cache-Control "no-store, no-cache" always;
        }

        # Auth — rate limiting strict
        location /api/v1/auth/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health check — pas de rate limit
        location /health {
            proxy_pass http://backend:8000;
            access_log off;
        }

        # Bloquer l'accès aux fichiers cachés
        location ~ /\. {
            deny all;
            access_log off;
        }
    }
}
