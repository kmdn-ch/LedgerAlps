run:
  timeout: 5m
  tests: true

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - bodyclose
    - noctx
    - sqlclosecheck
  disable:
    - exhaustive
    - wrapcheck
    - nlreturn
    - gci
    - godot
    - godox
    - funlen
    - cyclop
    - gocognit
    # gofmt: pre-existing files have Windows CRLF inconsistencies; run gofmt manually
    - gofmt
    # misspell: multilingual codebase (French/Swiss comments, British spellings like
    # "cancelled" are valid in this context)
    - misspell

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment
      - shadow
      # unusedwrite: Contact.IsActive is scanned from DB but not used in PDF rendering —
      # acceptable pattern for partial struct population
      - unusedwrite
  staticcheck:
    checks: ["all", "-SA1019"]

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-rules:
    # Test files have less strict requirements
    - path: _test\.go
      linters:
        - errcheck
        - bodyclose
    # Migration files are SQL, not Go
    - path: internal/db/migrations
      linters:
        - all
    # Generated files
    - path: ".*\\.pb\\.go"
      linters:
        - all
    # tx.Rollback in deferred error paths — the error is secondary to the
    # primary error already being returned; suppress to avoid noise.
    - linters:
        - errcheck
      text: "Error return value of `.*Rollback` is not checked"
    # Integration tests use http.NewRequest without context (pre-existing pattern)
    - path: internal/integration/integration_test\.go
      linters:
        - noctx
